<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Rifts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body data-page="contact">
    <header class="site-nav">
      <a class="brand" href="./index.html" aria-label="Rifts home">
        <img src="./assets/riftstextlogo.png" alt="Rifts" />
      </a>
      <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="is-active" href="./contact.html">Contact</a>
        <a href="./index.html">Home</a>
        <a href="./overpaying.html">Overpaying?</a>
      </nav>
      <a class="nav-cta" href="https://calendly.com/christopher-_-ryan/free-consultation" target="_blank" rel="noopener noreferrer">
        Book a Call
      </a>
    </header>

    <main>
      <section class="contact-shell">
        <form class="contact-card" id="contactForm">
          <p class="eyebrow">Contact</p>
          <h1>Get in Touch</h1>
          <p class="lede">Have questions? We'd love to hear from you.</p>
          <label class="field">
            <span>Email Address</span>
            <input type="email" id="contactEmail" placeholder="your@email.com" required />
          </label>
          <label class="field">
            <span>Message</span>
            <textarea id="contactMessage" rows="6" placeholder="Tell us what's on your mind..." required></textarea>
          </label>
          <button class="primary-action" type="submit">Send Message</button>
          <p class="form-note" id="contactStatus" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer>
      <span>© 2025 Rifts Cloud</span>
      <a href="mailto:hello@rifts.cloud">hello@rifts.cloud</a>
      <a href="./overpaying.html">Overpaying?</a>
    </footer>

    <script type="module" src="./app.js?v=rifts-full-1"></script>
  </body>
</html>
